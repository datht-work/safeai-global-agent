name: Prompt Evaluation (promptfoo)

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "skills/**/*.md"
      - "knowledge/**/*.md"
      - "tests/promptfooconfig.yaml"
  push:
    branches:
      - main
    paths:
      - "SKILL.md"
      - "skills/**/*.md"
      - "knowledge/**/*.md"
      - "tests/promptfooconfig.yaml"

jobs:
  prompt-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Run AI Prompt Evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd tests
          promptfoo eval -c promptfooconfig.yaml --no-cache
          promptfoo cache clear
